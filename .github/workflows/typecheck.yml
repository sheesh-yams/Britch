name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # postinstall runs prisma generate, but be explicit for visibility
      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript — report ALL errors at once
        run: npx tsc --noEmit
