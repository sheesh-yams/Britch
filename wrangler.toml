name = "britch"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext — builds to .open-next/
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets" }

[[d1_databases]]
binding = "DB"
database_name = "britch-db"
database_id = "354c439f-487e-4bec-a725-26b4533a93aa"
migrations_dir = "prisma/migrations"
migrations_pattern = "prisma/migrations/*/migration.sql"

[[kv_namespaces]]
binding = "KV"
id = "669dfba90463470c990f8522336b5fef"

[[r2_buckets]]
binding = "R2"
bucket_name = "britch-assets"

[vars]
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "REPLACE_WITH_TURNSTILE_SITE_KEY"
BETTER_AUTH_URL = "https://britch.ashish-yamdagni.workers.dev"
NEXT_PUBLIC_APP_URL = "https://britch.ashish-yamdagni.workers.dev"
R2_PUBLIC_URL = ""  # Set to your R2 public bucket URL after deploy (e.g. https://pub-xxx.r2.dev)
# BETTER_AUTH_SECRET + TURNSTILE_SECRET_KEY are set via `wrangler secret put` — never commit secrets to [vars]

# Local dev overrides
[dev]
port = 3000
