name = "britch"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext — builds to .open-next/
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets" }

[[d1_databases]]
binding = "DB"
database_name = "britch-db"
database_id = "198a69b6-b549-4788-8cca-cb408f9344be"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "KV"
id = "669dfba90463470c990f8522336b5fef"

[[r2_buckets]]
binding = "R2"
bucket_name = "britch-assets"

[vars]
BETTER_AUTH_URL = "https://britch.ashish-yamdagni.workers.dev"
NEXT_PUBLIC_APP_URL = "https://britch.ashish-yamdagni.workers.dev"
R2_PUBLIC_URL = ""  # Set to your R2 public bucket URL after deploy (e.g. https://pub-xxx.r2.dev)
# BETTER_AUTH_SECRET is set via `wrangler secret put` on the britch Worker.
# Turnstile sitekey is hardcoded in src/lib/turnstile.ts (it's public anyway, and
# NEXT_PUBLIC_* env vars are baked at Next.js build time — vars under [vars] here
# aren't visible to the build, only to the runtime Worker).
# TURNSTILE_SECRET_KEY lives on the separate siteverify Worker (turnstile-siteverify-britch),
# not here. The browser never talks to it directly.

# Local dev overrides
[dev]
port = 3000
